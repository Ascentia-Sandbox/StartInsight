name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Fast unit tests (no external services needed)
  backend-test-fast:
    name: Backend Tests (Fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.5.14/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          uv pip install --system -r pyproject.toml
          uv pip install --system ".[dev]"

      - name: Run linter and formatter
        working-directory: ./backend
        run: |
          ruff check .
          ruff format --check .

      - name: Run fast tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test_key
          OPENAI_API_KEY: test_key
          FIRECRAWL_API_KEY: test_key
          REDDIT_CLIENT_ID: test_client
          REDDIT_CLIENT_SECRET: test_secret
          REDDIT_USER_AGENT: test_agent
          RESEND_API_KEY: ""
        run: |
          pytest tests/unit tests/services tests/scrapers tests/feature -v \
            --cov=app --cov-report=xml --cov-fail-under=35 \
            --reruns 2 --reruns-delay 1

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend-fast

      - name: Coverage report on PR
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3
        with:
          coverageFile: backend/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}

  # Integration tests (requires Postgres + Redis services)
  backend-test-integration:
    name: Backend Tests (Integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.5.14/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          uv pip install --system -r pyproject.toml
          uv pip install --system ".[dev]"

      - name: Run integration tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test_key
          OPENAI_API_KEY: test_key
          FIRECRAWL_API_KEY: test_key
          REDDIT_CLIENT_ID: test_client
          REDDIT_CLIENT_SECRET: test_secret
          REDDIT_USER_AGENT: test_agent
          RESEND_API_KEY: ""
        run: |
          pytest tests/integration -v --reruns 2 --reruns-delay 1

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run TypeScript check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_for_build
        run: npm run build

  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.5.14/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: uv pip install --system -r pyproject.toml

      - name: Run pip-audit
        working-directory: ./backend
        run: |
          pip install pip-audit
          pip-audit --strict || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

  # Migrate Staging Database (on develop push)
  migrate-staging:
    name: Migrate Staging DB
    runs-on: ubuntu-latest
    needs: [backend-test-fast, backend-test-integration]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.5.14/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: uv pip install --system -r pyproject.toml

      - name: Run Alembic migrations
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: alembic upgrade head

  # Deploy to Staging (on develop branch push)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-test-fast, backend-test-integration, frontend-test, security-scan, migrate-staging]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Backend to Railway (Staging)
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service backend --environment staging --project a3ece066-4758-4780-84d6-0379f1312227

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_STAGING }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build Frontend with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_STAGING }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy Frontend to Vercel (Staging/Preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_STAGING }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Staging health check
        env:
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: |
          sleep 30
          curl -f ${STAGING_BACKEND_URL}/health || exit 1

  # Migrate Production Database (on main push)
  migrate-production:
    name: Migrate Production DB
    runs-on: ubuntu-latest
    needs: [backend-test-fast, backend-test-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.5.14/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: uv pip install --system -r pyproject.toml

      - name: Run Alembic migrations
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # Deploy to Production (on main push)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test-fast, backend-test-integration, frontend-test, security-scan, migrate-production]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Backend to Railway (Production)
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --environment production --project a3ece066-4758-4780-84d6-0379f1312227

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy Frontend to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_STAGING }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          vercel --prod --token=$VERCEL_TOKEN \
            --build-env NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL \
            --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY

      - name: Post-deploy health check
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          echo "Waiting 90s for Railway to build and deploy..."
          sleep 90
          for i in {1..5}; do
            curl -sf ${BACKEND_URL}/health && echo "Health check passed" && exit 0
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
