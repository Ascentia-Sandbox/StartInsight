name: Sentry Auto-Fix

on:
  repository_dispatch:
    types: [sentry-autofix]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  autofix:
    name: Apply Known Fix Pattern
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run auto-fix script
        id: fix
        env:
          SENTRY_ISSUE_ID: ${{ github.event.client_payload.issue_id }}
          SENTRY_ISSUE_TITLE: ${{ github.event.client_payload.title }}
          SENTRY_ISSUE_URL: ${{ github.event.client_payload.url }}
          ERROR_PATTERN: ${{ github.event.client_payload.pattern }}
        run: |
          python backend/scripts/sentry_autofix.py

      - name: Ensure labels exist
        if: steps.fix.outputs.fixed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create autofix --repo "$GITHUB_REPOSITORY" --color "10b981" --description "Auto-fix applied" 2>/dev/null || true
          gh label create sentry --repo "$GITHUB_REPOSITORY" --color "e11d48" --description "Sentry error tracking" 2>/dev/null || true
          gh label create triage --repo "$GITHUB_REPOSITORY" --color "f59e0b" --description "Needs triage" 2>/dev/null || true

      - name: Create branch and PR
        if: steps.fix.outputs.fixed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_ID="${{ github.event.client_payload.issue_id }}"
          BRANCH="autofix/sentry-${ISSUE_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "$(cat <<'EOF'
          fix: auto-fix Sentry issue ${{ github.event.client_payload.issue_id }}

          Pattern: ${{ github.event.client_payload.pattern }}
          Sentry: ${{ github.event.client_payload.url }}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          EOF
          )"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix: auto-fix Sentry #${ISSUE_ID}" \
            --body "$(cat <<'EOF'
          ## Auto-Fix from Sentry

          **Issue:** ${{ github.event.client_payload.title }}
          **Pattern:** `${{ github.event.client_payload.pattern }}`
          **Sentry Link:** ${{ github.event.client_payload.url }}

          This PR was automatically generated by the Sentry auto-fix workflow.
          **Requires human review before merging.**

          ## Changes Applied
          See diff for details. The fix follows a known, verified pattern.
          EOF
          )" \
            --label "autofix,sentry" \
            --base main

      - name: Create issue for unmatched pattern
        if: steps.fix.outputs.fixed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "[Sentry] Unmatched error pattern: ${{ github.event.client_payload.title }}" \
            --body "$(cat <<'EOF'
          ## Unmatched Sentry Error

          **Issue ID:** ${{ github.event.client_payload.issue_id }}
          **Title:** ${{ github.event.client_payload.title }}
          **Pattern:** `${{ github.event.client_payload.pattern }}`
          **Sentry Link:** ${{ github.event.client_payload.url }}

          The auto-fix script could not match this error to a known fix pattern.
          Manual investigation required.
          EOF
          )" \
            --label "sentry,triage"
